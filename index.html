const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function decodeSfx(dataUrl, volume = 1) {
  const res = await fetch(dataUrl);
  const buf = await res.arrayBuffer();
  const decoded = await audioCtx.decodeAudioData(buf);
  return () => {
    const src  = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    gain.gain.value = volume;
    src.buffer = decoded;
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
  };
}

// ─── ASSET LOADER ────────────────────────────────────────────────────────────
function loadImg(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => { console.warn('Missing:', src); resolve(null); };
    img.src = src;
  });
}

async function loadAll() {
  const defs = {
    bgBack:      BG_PATH + 'blue-back.png',
    bgStars:     BG_PATH + 'blue-stars.png',
    bgWithStars: BG_PATH + 'blue-with-stars.png',
    planetSmall: BG_PATH + 'prop-planet-small.png',
    planetBig:   BG_PATH + 'prop-planet-big.png',
    asteroid1:   BG_PATH + 'asteroid-1.png',
    asteroid2:   BG_PATH + 'asteroid-2.png',
  };
  for (let i = 1; i <= 10; i++) defs[`ship${i}`]   = SPRITES + `Ship/ship${i}.png`;
  for (let i = 1; i <= 2;  i++) defs[`eSmall${i}`] = SPRITES + `EnemySmall/enemy-small${i}.png`;
  for (let i = 1; i <= 2;  i++) defs[`eMed${i}`]   = SPRITES + `Enemy Medium/enemy-medium${i}.png`;
  for (let i = 1; i <= 2;  i++) defs[`eBig${i}`]   = SPRITES + `EnemyBig/enemy-big${i}.png`;
  for (let i = 1; i <= 5;  i++) defs[`exp${i}`]    = SPRITES + `Explosion/explosion${i}.png`;
  for (let i = 1; i <= 4;  i++) defs[`pu${i}`]     = SPRITES + `PowerUps/power-up${i}.png`;

  const result = {};
  await Promise.all(
    Object.entries(defs).map(([k, src]) => loadImg(src).then(img => { result[k] = img; }))
  );
  return result;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function hits(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
class Background {
  constructor(imgs, cfg) {
    const m      = cfg.scrollMult;
    this.back    = imgs.bgBack;
    this.stars   = imgs[cfg.starsKey] || null;
    this.speed1  = 12 * m;
    this.speed2  = 28 * m;
    this.y1 = 0; this.y2 = 0;

    // Drifting planet prop (stages 1 & 2)
    this.prop = null;
    if (cfg.propKey && imgs[cfg.propKey]) {
      this.prop = {
        img: imgs[cfg.propKey], sz: cfg.propSz,
        x: 80 + Math.random() * (W - 160),
        y: -cfg.propSz,
        spd: 10 * m,
      };
    }

    // Rotating asteroid props (stage 3)
    this.asteroids = [];
    if (cfg.starsKey === 'bgWithStars') {
      for (let i = 0; i < 3; i++) {
        const sz = 24 + Math.random() * 16;
        this.asteroids.push({
          img: i % 2 === 0 ? imgs.asteroid1 : imgs.asteroid2,
          sz,
          x: 40 + Math.random() * (W - 80),
          y: -sz - i * 240,
          spd: (35 + Math.random() * 25) * m,
          rot: Math.random() * Math.PI * 2,
          rotSpd: (Math.random() - 0.5) * 2,
        });
      }
    }
  }

  drawLayer(img, y) {
    if (!img) { ctx.fillStyle = '#050a1a'; ctx.fillRect(0, 0, W, H); return; }
    ctx.drawImage(img, 0, y - H, W, H);
    ctx.drawImage(img, 0, y,     W, H);
  }

  update(dt) {
    this.y1 = (this.y1 + this.speed1 * dt) % H;
    this.y2 = (this.y2 + this.speed2 * dt) % H;

    if (this.prop) {
      this.prop.y += this.prop.spd * dt;
      if (this.prop.y > H + this.prop.sz) {
        this.prop.y = -this.prop.sz;
        this.prop.x = 80 + Math.random() * (W - 160);
      }
    }

    for (const a of this.asteroids) {
      a.y   += a.spd * dt;
      a.rot += a.rotSpd * dt;
      if (a.y > H + a.sz) {
        a.y = -a.sz;
        a.x = 40 + Math.random() * (W - 80);
      }
    }
  }

  draw() {
    this.drawLayer(this.back,  this.y1);
    this.drawLayer(this.stars, this.y2);

    if (this.prop && this.prop.img) {
      const { img, sz, x, y } = this.prop;
      ctx.drawImage(img, x - sz / 2, y - sz / 2, sz, sz);
    }

    for (const a of this.asteroids) {
      if (!a.img) continue;
      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.rotate(a.rot);
      ctx.drawImage(a.img, -a.sz / 2, -a.sz / 2, a.sz, a.sz);
      ctx.restore();
    }
  }
}

// ─── BULLET ──────────────────────────────────────────────────────────────────
class Bullet {
  constructor(x, y, vx, vy, fromEnemy = false) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.fromEnemy = fromEnemy;
    this.w    = fromEnemy ? 5  : 4;
    this.h    = fromEnemy ? 10 : 14;
    this.gone = false;
  }

  get box() {
    return { x: this.x - this.w / 2, y: this.y - this.h / 2, w: this.w, h: this.h };
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    if (this.y < -30 || this.y > H + 30 || this.x < -30 || this.x > W + 30) this.gone = true;
  }

  draw() {
    ctx.save();
    if (this.fromEnemy) {
      ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 8; ctx.fillStyle = '#ff8844';
    } else {
      ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 8; ctx.fillStyle = '#88ffff';
    }
    ctx.fillRect(this.x - this.w / 2, this.y - this.h / 2, this.w, this.h);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(this.x - 1, this.y - this.h / 2, 2, this.h);
    ctx.restore();
  }
}

// ─── EXPLOSION ───────────────────────────────────────────────────────────────
class Explosion {
  constructor(frames, x, y, sz) {
    this.frames = frames;
    this.x = x; this.y = y; this.sz = sz;
    this.t    = 0;
    this.done = false;
  }

  update(dt) {
    this.t += dt * 14;
    if (this.t >= this.frames.length) this.done = true;
  }

  draw() {
    const f = this.frames[Math.min(Math.floor(this.t), this.frames.length - 1)];
    if (f) ctx.drawImage(f, this.x - this.sz / 2, this.y - this.sz / 2, this.sz, this.sz);
  }
}

// ─── POWER-UP ────────────────────────────────────────────────────────────────
// type: 0=speed  1=twin  2=spread  3=extra life
class PowerUp {
  constructor(frames, x, y, type) {
    this.img  = frames[type];
    this.type = type;
    this.x = x; this.y = y;
    this.sz = 28; this.vy = 70;
    this.t    = 0;
    this.gone = false;
  }

  get box() {
    return { x: this.x - this.sz / 2, y: this.y - this.sz / 2, w: this.sz, h: this.sz };
  }

  update(dt) { this.y += this.vy * dt; this.t += dt; }

  draw() {
    if (!this.img) return;
    const bob = Math.sin(this.t * 3) * 3;
    ctx.save();
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 10;
    ctx.drawImage(this.img, this.x - this.sz / 2, this.y - this.sz / 2 + bob, this.sz, this.sz);
    ctx.restore();
  }
}

// ─── ENEMY ───────────────────────────────────────────────────────────────────
const ENEMY_STATS = {
  small:  { hp: 1,  sz: 32, fireRate: 3.5, pts: 100  },
  medium: { hp: 3,  sz: 48, fireRate: 2.2, pts: 250  },
  big:    { hp: 5,  sz: 52, fireRate: 2.0, pts: 400  }, // strafing type
  boss:   { hp: 20, sz: 80, fireRate: 1.2, pts: 1000 },
};

class Enemy {
  constructor(type, frames, x, y, overrides = {}) {
    const s       = { ...ENEMY_STATS[type], ...overrides };
    this.type     = type;
    this.frames   = frames;
    this.x        = x; this.y = y; this.startX = x;
    this.hp       = s.hp; this.maxHp = s.hp;
    this.sz       = s.sz;
    this.fireRate  = s.fireRate;
    this.pts       = s.pts;
    this.t         = Math.random() * Math.PI * 2;
    this.animT     = 0;
    this.fireTimer = 1.5 + Math.random() * 2;
    this.bullets   = [];
    this.gone      = false;

    // Per-type movement parameters
    if (type === 'small')  { this.spd = 110; this.amp = 60; this.wob = 1.8; }
    if (type === 'medium') { this.spd = 68;  this.amp = 35; this.wob = 1.2; }

    // Strafing big: enters from one side, moves straight across
    if (type === 'big') {
      this.strafeDir = x < 0 ? 1 : -1;  // from left → go right
      this.strafeSpd = 130;
    }
  }

  get box() {
    const p = 5;
    return { x: this.x - this.sz / 2 + p, y: this.y - this.sz / 2 + p,
             w: this.sz - p * 2, h: this.sz - p * 2 };
  }

  get offscreen() {
    if (this.type === 'boss') return false;
    if (this.type === 'big')  return this.strafeDir > 0 ? this.x > W + this.sz : this.x < -this.sz;
    return this.y > H + this.sz;
  }

  update(dt, px, py) {
    this.t     += dt;
    this.animT += dt;

    if (this.type === 'boss') {
      if (this.y < 160) {
        this.y = Math.min(this.y + 60 * dt, 160);
      } else {
        this.x = this.startX + Math.sin(this.t * 0.5) * 140;
        this.x = Math.max(this.sz / 2, Math.min(W - this.sz / 2, this.x));
      }
    } else if (this.type === 'big') {
      this.x += this.strafeDir * this.strafeSpd * dt;
    } else {
      this.y += this.spd * dt;
      this.x  = this.startX + Math.sin(this.t * this.wob) * this.amp;
      this.x  = Math.max(this.sz / 2, Math.min(W - this.sz / 2, this.x));
    }

    this.fireTimer -= dt;
    if (this.fireTimer <= 0 && this.y > 0 && this.y < H + this.sz) {
      this.fire(px, py);
      this.fireTimer = this.fireRate + Math.random() * 0.4;
    }

    this.bullets = this.bullets.filter(b => !b.gone);
    this.bullets.forEach(b => b.update(dt));
  }

  fire(px, py) {
    const dx = px - this.x, dy = py - this.y;
    const d  = Math.hypot(dx, dy) || 1;
    const spd = 185;
    const ox = this.x, oy = this.y + this.sz / 2;

    if (this.type === 'boss') {
      // Triple spread: aimed ± 25°
      const ang    = Math.atan2(dy, dx);
      const spread = Math.PI / 7;
      for (let a = -spread; a <= spread + 0.001; a += spread) {
        this.bullets.push(new Bullet(ox, oy, Math.cos(ang + a) * spd, Math.sin(ang + a) * spd, true));
      }
    } else {
      this.bullets.push(new Bullet(ox, oy, (dx / d) * spd, (dy / d) * spd, true));
    }
  }

  draw() {
    const fi = Math.floor(this.animT * 6) % this.frames.length;
    const f  = this.frames[fi];
    if (f) ctx.drawImage(f, this.x - this.sz / 2, this.y - this.sz / 2, this.sz, this.sz);

    // HP bar above medium and big enemies (boss gets the full-screen bar)
    if (this.type === 'medium' || this.type === 'big') {
      const bx = this.x - this.sz / 2, by = this.y - this.sz / 2 - 9;
      ctx.fillStyle = '#222';
      ctx.fillRect(bx, by, this.sz, 4);
      const pct = this.hp / this.maxHp;
      ctx.fillStyle = pct > 0.5 ? '#00ff44' : pct > 0.25 ? '#ffaa00' : '#ff2200';
      ctx.fillRect(bx, by, this.sz * pct, 4);
    }

    this.bullets.forEach(b => b.draw());
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
class Player {
  constructor(imgs) {
    this.frames     = Array.from({ length: 10 }, (_, i) => imgs[`ship${i + 1}`]);
    this.x          = W / 2;
    this.y          = H - 100;
    this.sz         = 48;
    this.speed      = 260;
    this.bank       = 4.0;    // float 0–9; frame 4 (ship5) is the neutral centre
    this.bullets    = [];
    this.fireTimer  = 0;
    this.inv        = 0;      // invincibility seconds remaining
    this.lives      = 3;
    this.pLevel     = 1;      // 1=single  2=twin  3=spread
    this.pTimer     = 0;
    this.speedBoost = 1;
    this.dead       = false;
  }

  get box() { return { x: this.x - 14, y: this.y - 18, w: 28, h: 36 }; }

  hit() {
    if (this.inv > 0) return;
    this.lives--;
    this.inv = 2.5;
    if (this.lives <= 0) {
      this.dead = true;
    } else {
      this.x = W / 2;
      this.y = H - 100;
    }
  }

  applyPU(type) {
    if      (type === 0) { this.speedBoost = 1.6; this.pTimer = 8; }
    else if (type === 1) { this.pLevel = Math.min(2, this.pLevel + 1); this.pTimer = 10; }
    else if (type === 2) { this.pLevel = 3; this.pTimer = 10; }
    else if (type === 3) { this.lives = Math.min(5, this.lives + 1); }
  }

  update(dt) {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) dx--;
    if (keys['ArrowRight'] || keys['KeyD']) dx++;
    if (keys['ArrowUp']    || keys['KeyW']) dy--;
    if (keys['ArrowDown']  || keys['KeyS']) dy++;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }

    this.x = Math.max(this.sz / 2, Math.min(W - this.sz / 2, this.x + dx * this.speed * this.speedBoost * dt));
    this.y = Math.max(this.sz / 2, Math.min(H - this.sz / 2, this.y + dy * this.speed * this.speedBoost * dt));

    // Banking: float frame index toward target
    const bankTarget = dx < 0 ? 0 : dx > 0 ? 9 : 4;
    if      (this.bank < bankTarget) this.bank = Math.min(this.bank + 10 * dt, bankTarget);
    else if (this.bank > bankTarget) this.bank = Math.max(this.bank - 10 * dt, bankTarget);

    this.fireTimer -= dt;
    if ((keys['Space'] || keys['KeyZ']) && this.fireTimer <= 0) {
      this.fire();
      this.fireTimer = FIRE_RATE;
    }

    if (this.pTimer > 0) {
      this.pTimer -= dt;
      if (this.pTimer <= 0) { this.pLevel = 1; this.speedBoost = 1; }
    }

    if (this.inv > 0) this.inv -= dt;

    this.bullets = this.bullets.filter(b => !b.gone);
    this.bullets.forEach(b => b.update(dt));
  }

  fire() {
    if (sfx.laser) sfx.laser();
    const bx = this.x, by = this.y - this.sz / 2;
    if (this.pLevel === 1) {
      this.bullets.push(new Bullet(bx, by, 0, -560));
    } else if (this.pLevel === 2) {
      this.bullets.push(new Bullet(bx - 14, by,     0, -560));
      this.bullets.push(new Bullet(bx + 14, by,     0, -560));
    } else {
      this.bullets.push(new Bullet(bx,      by,      0, -560));
      this.bullets.push(new Bullet(bx - 16, by + 8, -90, -540));
      this.bullets.push(new Bullet(bx + 16, by + 8,  90, -540));
    }
  }

  draw() {
    // Flicker every ~⅛ second during invincibility
    if (this.inv > 0 && Math.floor(this.inv * 8) % 2 === 0) {
      this.bullets.forEach(b => b.draw());
      return;
    }
    const frame = this.frames[Math.round(this.bank)];
    if (frame) ctx.drawImage(frame, this.x - this.sz / 2, this.y - this.sz / 2, this.sz, this.sz);
    this.bullets.forEach(b => b.draw());
  }
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let state = 'loading';
let bg, player, enemies = [], exps = [], pups = [];
let score, wavesSpawned, waveTimer, waveInterval, phase, overlayTimer, introTimer;
let currentStage = 1;
let imgs         = null;
let highScore    = parseInt(localStorage.getItem('spaceHighScore') || '0', 10);

let smallFrames, medFrames, bigFrames, bossFrames, expFrames, puFrames;

function boom(x, y, sz) { exps.push(new Explosion(expFrames, x, y, sz)); }

function saveHiScore() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('spaceHighScore', String(highScore));
  }
}

// Start a fresh game from stage 1
function startGame() {
  currentStage = 1;
  score        = 0;
  player       = null; // created fresh in startStage
  startStage();
}

// Initialise (or re-initialise) the current stage, keeping player lives/score
function startStage() {
  const cfg = STAGE_CFGS[currentStage - 1];
  bg = new Background(imgs, cfg);

  if (!player) {
    player = new Player(imgs);
  } else {
    // Carry lives + score across stages; reset position and power-ups
    player.x = W / 2; player.y = H - 100;
    player.bank = 4.0;
    player.bullets = [];
    player.pLevel = 1; player.pTimer = 0; player.speedBoost = 1;
    player.inv = 0; player.dead = false;
  }

  enemies      = [];
  exps         = [];
  pups         = [];
  wavesSpawned = 0;
  waveInterval = cfg.waveIntervalStart;
  waveTimer    = 2.0;
  phase        = 'waves';
  overlayTimer = 0;
  introTimer   = 2.0;
  state        = 'intro';
}

function spawnWave(wi) {
  const cfg = STAGE_CFGS[currentStage - 1];
  for (const { t, n } of cfg.waves[wi]) {
    for (let i = 0; i < n; i++) {
      let e;
      if (t === 'big') {
        const fromLeft = Math.random() > 0.5;
        const sx = fromLeft ? -60 : W + 60;
        const sy = 80 + Math.random() * 200;
        e = new Enemy('big', bigFrames, sx, sy);
      } else {
        const x      = 70 + Math.random() * (W - 140);
        const frames = t === 'small' ? smallFrames : medFrames;
        e = new Enemy(t, frames, x, -50 - i * 70);
      }
      enemies.push(e);
    }
  }
}

// Returns true if the hit was fatal (caller should return immediately from update)
function damagePlayer() {
  player.hit();
  if (player.dead) {
    boom(player.x, player.y, 80);
    saveHiScore();
    state        = 'gameover';
    overlayTimer = 0.8;
    return true;
  }
  return false;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  bg.update(dt);

  // Explosions keep running on all screens
  exps = exps.filter(e => !e.done);
  exps.forEach(e => e.update(dt));

  if (state === 'intro') {
    introTimer -= dt;
    if (introTimer <= 0) state = 'playing';
    return;
  }

  if (state !== 'playing') {
    overlayTimer = Math.max(0, overlayTimer - dt);
    return;
  }

  player.update(dt);

  // Wave spawner: interval tightens each wave, capped at stage minimum
  if (phase === 'waves') {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      const cfg = STAGE_CFGS[currentStage - 1];
      if (wavesSpawned < cfg.waves.length) {
        spawnWave(wavesSpawned++);
        waveInterval = Math.max(cfg.waveIntervalMin, waveInterval - 0.2);
        waveTimer    = waveInterval;
      }
    }
  }

  // Remove entities that died or left the screen last frame
  enemies = enemies.filter(e => !e.gone && !e.offscreen);
  pups    = pups.filter(p => !p.gone && p.y < H + 50);

  enemies.forEach(e => e.update(dt, player.x, player.y));
  pups.forEach(p => p.update(dt));

  // ── Player bullets → enemies ──────────────────────────────────────────────
  for (const b of player.bullets) {
    for (const e of enemies) {
      if (!b.gone && hits(b.box, e.box)) {
        b.gone = true;
        if (--e.hp <= 0) {
          e.gone = true;
          score += e.pts;
          boom(e.x, e.y, e.sz * 1.5);
          if (Math.random() < 0.22)
            pups.push(new PowerUp(puFrames, e.x, e.y, Math.floor(Math.random() * 4)));
        }
      }
    }
  }

  // ── Enemy bullets + bodies → player ──────────────────────────────────────
  for (const e of enemies) {
    for (const b of e.bullets) {
      if (!b.gone && hits(b.box, player.box)) {
        b.gone = true;
        if (damagePlayer()) return;
      }
    }
    if (player.inv <= 0 && hits(e.box, player.box)) {
      e.gone = true;
      boom(e.x, e.y, e.sz);
      if (damagePlayer()) return;
    }
  }

  // ── Power-ups → player ────────────────────────────────────────────────────
  for (const p of pups) {
    if (!p.gone && hits(p.box, player.box)) {
      p.gone = true;
      player.applyPU(p.type);
    }
  }

  // ── Phase transitions ─────────────────────────────────────────────────────
  enemies = enemies.filter(e => !e.gone); // re-filter kills from this frame

  if (phase === 'waves' && wavesSpawned >= STAGE_CFGS[currentStage - 1].waves.length && enemies.length === 0) {
    phase = 'boss';
    const cfg = STAGE_CFGS[currentStage - 1];
    enemies.push(new Enemy('boss', bossFrames, W / 2, -80, { hp: cfg.bossHp, fireRate: cfg.bossFire }));
  } else if (phase === 'boss' && enemies.length === 0) {
    saveHiScore();
    if (currentStage >= 3) {
      state        = 'win';
      overlayTimer = 0.8;
    } else {
      state        = 'stageclear';
      overlayTimer = 2.0;
    }
  }
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function drawHUD() {
  if (!player) return;
  ctx.save();
  ctx.font        = 'bold 18px "Courier New", monospace';
  ctx.fillStyle   = '#ffffff';
  ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 6;

  ctx.textAlign = 'left';
  ctx.fillText(`SCORE  ${String(score).padStart(6, '0')}`, 12, 28);

  ctx.textAlign = 'center';
  if (phase === 'waves') {
    ctx.fillText(`ST${currentStage}  WAVE ${wavesSpawned}/${STAGE_CFGS[currentStage - 1].waves.length}`, W / 2, 28);
  } else {
    ctx.fillStyle = '#ff8800'; ctx.shadowColor = '#ff4400';
    ctx.fillText(`ST${currentStage}  !! BOSS !!`, W / 2, 28);
  }

  // Lives as small ship icons
  const lifeIcon = player.frames[4];
  for (let i = 0; i < player.lives; i++) {
    if (lifeIcon) ctx.drawImage(lifeIcon, W - 34 - i * 32, 8, 26, 26);
  }

  // Active power-up labels
  ctx.font = 'bold 14px "Courier New", monospace';
  ctx.textAlign = 'left'; ctx.shadowBlur = 4;
  let px2 = 12;
  if (player.pLevel === 2) {
    ctx.fillStyle = '#ffff44'; ctx.shadowColor = '#ffff00';
    ctx.fillText('TWIN', px2, 50); px2 += 52;
  } else if (player.pLevel === 3) {
    ctx.fillStyle = '#ff8844'; ctx.shadowColor = '#ff6600';
    ctx.fillText('SPREAD', px2, 50); px2 += 72;
  }
  if (player.speedBoost > 1) {
    ctx.fillStyle = '#44ff88'; ctx.shadowColor = '#00ff44';
    ctx.fillText('SPD', px2, 50);
  }

  ctx.restore();
}

function drawBossBar(boss) {
  ctx.save();
  const bx = 20, by = H - 38, bw = W - 40, bh = 10;
  ctx.fillStyle = '#111'; ctx.fillRect(bx, by, bw, bh);
  const pct = boss.hp / boss.maxHp;
  ctx.fillStyle   = pct > 0.5 ? '#ff6600' : pct > 0.25 ? '#ff3300' : '#ff0000';
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8;
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.fillStyle = '#ffaa44'; ctx.shadowBlur = 0;
  ctx.font = 'bold 13px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', W / 2, by - 4);
  ctx.restore();
}

function drawOverlay(title, titleColor, lines) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 48px "Courier New", monospace';
  ctx.fillStyle   = titleColor; ctx.shadowColor = titleColor; ctx.shadowBlur = 20;
  ctx.fillText(title, W / 2, H / 2 - 60);
  ctx.font        = 'bold 20px "Courier New", monospace';
  ctx.fillStyle   = '#dddddd'; ctx.shadowBlur = 6;
  lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + 10 + i * 38));
  ctx.restore();
}

function drawTitle() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  // Ship icon
  const shipImg = imgs && imgs.ship5;
  if (shipImg) ctx.drawImage(shipImg, W / 2 - 24, H / 2 - 188, 48, 48);

  // Title text
  ctx.textAlign = 'center';
  ctx.font      = 'bold 60px "Courier New", monospace';
  ctx.fillStyle = '#44ffff'; ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 24;
  ctx.fillText('SPACE', W / 2, H / 2 - 82);
  ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#ffffff';
  ctx.fillText('SHOOTER', W / 2, H / 2 - 20);

  // Controls
  ctx.font = 'bold 15px "Courier New", monospace';
  ctx.fillStyle = '#aaaaaa'; ctx.shadowBlur = 0;
  ctx.fillText('WASD / ARROWS  —  move', W / 2, H / 2 + 44);
  ctx.fillText('SPACE / Z  —  fire', W / 2, H / 2 + 68);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffaa00'; ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 6;
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.fillText(`HI-SCORE  ${String(highScore).padStart(6, '0')}`, W / 2, H / 2 + 112);
  }

  // Pulsing "press enter"
  const pulse = 0.55 + 0.45 * Math.sin(Date.now() * 0.0025);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffff44'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.fillText('PRESS  ENTER  TO  START', W / 2, H / 2 + 164);
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawIntro() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  const stageColors = ['#44ffff', '#ff8844', '#cc44ff'];
  const col = stageColors[currentStage - 1];

  ctx.textAlign = 'center';
  ctx.font      = 'bold 72px "Courier New", monospace';
  ctx.fillStyle = '#ffffff'; ctx.shadowColor = col; ctx.shadowBlur = 28;
  ctx.fillText(`STAGE  ${currentStage}`, W / 2, H / 2 - 20);

  // Coloured separator line
  ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 130, H / 2 + 24);
  ctx.lineTo(W / 2 + 130, H / 2 + 24);
  ctx.stroke();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  bg.draw();

  if (state === 'title') { drawTitle(); return; }
  if (state === 'intro') { drawIntro(); return; }

  // All gameplay states: render entities behind any overlay
  enemies.filter(e => !e.gone).forEach(e => e.draw());
  pups.filter(p => !p.gone).forEach(p => p.draw());
  if (player && !player.dead) player.draw();
  exps.forEach(e => e.draw());
  drawHUD();

  const boss = enemies.find(e => e.type === 'boss' && !e.gone);
  if (boss) drawBossBar(boss);

  if (state === 'stageclear') {
    drawOverlay(`STAGE ${currentStage} CLEAR!`, '#44ffff', [
      `SCORE  ${String(score).padStart(6, '0')}`,
    ]);
  } else if (state === 'gameover') {
    drawOverlay('GAME OVER', '#ff4444', [
      `SCORE  ${String(score).padStart(6, '0')}`,
      `HI-SCORE  ${String(highScore).padStart(6, '0')}`,
      '',
      'PRESS ENTER TO RETRY',
    ]);
  } else if (state === 'win') {
    drawOverlay('YOU WIN!', '#ffff44', [
      `SCORE  ${String(score).padStart(6, '0')}`,
      `HI-SCORE  ${String(highScore).padStart(6, '0')}`,
      '',
      'PRESS ENTER TO PLAY AGAIN',
    ]);
  }
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
let prevT = 0;

function loop(ts) {
  const dt = Math.min((ts - prevT) / 1000, 0.05);
  prevT = ts;

  if (keys['Enter']) {
    if (state === 'title') {
      keys['Enter'] = false;
      startGame();
    } else if ((state === 'gameover' || state === 'win') && overlayTimer <= 0) {
      keys['Enter'] = false;
      bg    = new Background(imgs, STAGE_CFGS[0]);
      state = 'title';
    }
  }

  // Auto-advance to next stage after the 2-second break
  if (state === 'stageclear' && overlayTimer <= 0) {
    currentStage++;
    startStage();
  }

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
(async () => {
  ctx.fillStyle = '#050a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#888'; ctx.textAlign = 'center'; ctx.font = '22px monospace';
  ctx.fillText('Loading…', W / 2, H / 2);

  [imgs, sfx.laser] = await Promise.all([
    loadAll(),
    decodeSfx(LASER_B64, 0.4),
  ]);

  smallFrames = [imgs.eSmall1, imgs.eSmall2];
  medFrames   = [imgs.eMed1,   imgs.eMed2];
  bigFrames   = [imgs.eBig1,   imgs.eBig2];
  bossFrames  = [imgs.eBig1,   imgs.eBig2]; // same art, different stats
  expFrames   = Array.from({ length: 5 }, (_, i) => imgs[`exp${i + 1}`]);
  puFrames    = Array.from({ length: 4 }, (_, i) => imgs[`pu${i + 1}`]);

  bg    = new Background(imgs, STAGE_CFGS[0]); // stage 1 bg scrolls behind title
  state = 'title';

  prevT = performance.now();
  requestAnimationFrame(loop);
})();
</script>
</body>
